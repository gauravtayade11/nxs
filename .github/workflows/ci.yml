name: nxs CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

  smoke-test:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: nxs --version
        run: node cli/index.js --version

      - name: nxs info
        run: node cli/index.js info

      - name: nxs explain CrashLoopBackOff (mock mode)
        run: node cli/index.js explain CrashLoopBackOff --json
        env:
          GROQ_API_KEY: ''
          ANTHROPIC_API_KEY: ''

      - name: nxs devops analyze (mock mode)
        run: |
          echo "ERROR: npm install failed with exit code 1" | \
          node cli/index.js devops analyze --stdin --json --no-chat
        env:
          GROQ_API_KEY: ''
          ANTHROPIC_API_KEY: ''

      - name: nxs rbac scan --json (no cluster — should exit gracefully)
        run: node cli/index.js rbac scan --json 2>&1 | head -5 || true

  notify-failure:
    name: Notify Failure (Slack)
    runs-on: ubuntu-latest
    needs: [lint, smoke-test]
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Analyze failure and notify Slack
        run: |
          {
            echo "GitHub Actions pipeline failed"
            echo "Workflow: ${{ github.workflow }}"
            echo "Branch:   ${{ github.ref_name }}"
            echo "Commit:   ${{ github.sha }}"
            echo "Actor:    ${{ github.actor }}"
            echo "Run URL:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "Lint:     ${{ needs.lint.result }}"
            echo "Smoke:    ${{ needs.smoke-test.result }}"
            echo "---"
            gh run view ${{ github.run_id }} 2>&1 || true
          } | node cli/index.js ci analyze --stdin --notify slack --no-chat --json || true
        env:
          GH_TOKEN: ${{ github.token }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: npm audit
        run: npm audit --audit-level=high || true
