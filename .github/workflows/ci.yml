name: nxs CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Stage 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee /tmp/lint.log

      - name: Upload lint failure log
        if: steps.eslint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: failure-log-lint
          path: /tmp/lint.log

      - name: Fail if lint failed
        if: steps.eslint.outcome == 'failure'
        run: exit 1

  # ── Stage 2: Test ────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          {
            echo "Branch:   ${{ github.ref_name }}"
            echo "Commit:   ${{ github.sha }}"
            echo "---"
            echo "PASS src/api/health.test.js (12ms)"
            echo "PASS src/api/users.test.js (18ms)"
            echo "FAIL src/services/auth.test.js"
            echo ""
            echo "  ● AuthService › login › should return 200 with valid credentials"
            echo ""
            echo "    expect(received).toBe(expected)"
            echo "    Expected: 200"
            echo "    Received: 401"
            echo ""
            echo "    Reason: TEST_JWT_SECRET environment variable is not set"
            echo "    The JWT verification failed because no secret was provided."
            echo ""
            echo "      at Object.<anonymous> (src/services/auth.test.js:34:5)"
            echo ""
            echo "Test Suites: 1 failed, 2 passed, 3 total"
            echo "Tests:       1 failed, 47 passed, 48 total"
            exit 1
          } 2>&1 | tee /tmp/test.log

      - name: Upload test failure log
        if: steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: failure-log-test
          path: /tmp/test.log

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

  # ── Stage 3: Smoke test ──────────────────────────────────────────────────────
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run smoke tests
        id: smoke
        continue-on-error: true
        run: |
          set -o pipefail
          {
            node cli/index.js --version
            node cli/index.js explain CrashLoopBackOff --json
            echo "ERROR: npm install failed" | node cli/index.js devops analyze --stdin --json --no-chat
          } 2>&1 | tee /tmp/smoke.log
        env:
          GROQ_API_KEY: ''
          ANTHROPIC_API_KEY: ''

      - name: Upload smoke failure log
        if: steps.smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: failure-log-smoke
          path: /tmp/smoke.log

      - name: Fail if smoke failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1

  # ── Notify: runs when ANY stage fails ────────────────────────────────────────
  notify-failure:
    name: Analyze & Notify
    runs-on: ubuntu-latest
    needs: [lint, test, smoke]
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Download whichever failure artifact was uploaded
      - name: Download failure logs
        uses: actions/download-artifact@v4
        with:
          pattern: failure-log-*
          path: /tmp/failure-logs
          merge-multiple: true

      # Combine all failure logs and pipe to nxs
      - name: Analyze failure and notify Slack
        run: |
          {
            echo "Pipeline:  ${{ github.workflow }}"
            echo "Branch:    ${{ github.ref_name }}"
            echo "Commit:    ${{ github.sha }}"
            echo "Actor:     ${{ github.actor }}"
            echo "Run URL:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "Lint:      ${{ needs.lint.result }}"
            echo "Test:      ${{ needs.test.result }}"
            echo "Smoke:     ${{ needs.smoke.result }}"
            echo "---"
            cat /tmp/failure-logs/*.log 2>/dev/null || echo "No failure logs captured"
          } | node cli/index.js ci analyze --stdin --notify slack --no-chat || true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── Security (runs independently) ───────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: npm audit
        run: npm audit --audit-level=high || true
