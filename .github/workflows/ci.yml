name: nxs CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

  smoke-test:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: nxs --version
        run: node cli/index.js --version

      - name: nxs info
        run: node cli/index.js info

      - name: nxs explain CrashLoopBackOff (mock mode)
        run: node cli/index.js explain CrashLoopBackOff --json
        env:
          GROQ_API_KEY: ''
          ANTHROPIC_API_KEY: ''

      - name: nxs devops analyze (mock mode)
        run: |
          echo "ERROR: npm install failed with exit code 1" | \
          node cli/index.js devops analyze --stdin --json --no-chat
        env:
          GROQ_API_KEY: ''
          ANTHROPIC_API_KEY: ''

      - name: nxs rbac scan --json (no cluster — should exit gracefully)
        run: node cli/index.js rbac scan --json 2>&1 | head -5 || true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high || true
