name: nxs CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Run tests
        run: |
          echo "PASS src/api/health.test.js (12ms)"
          echo "PASS src/api/users.test.js (18ms)"
          echo "FAIL src/services/auth.test.js"
          echo ""
          echo "  ● AuthService › login › should return 200 with valid credentials"
          echo "    Expected: 200"
          echo "    Received: 401"
          echo "    Reason: TEST_JWT_SECRET environment variable is not set"
          echo "    The JWT verification failed because no secret was provided."
          echo "    at Object.<anonymous> (src/services/auth.test.js:34:5)"
          echo ""
          echo "Test Suites: 1 failed, 2 passed, 3 total"
          echo "Tests:       1 failed, 47 passed, 48 total"
          exit 1

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: node cli/index.js --version
      - run: node cli/index.js explain CrashLoopBackOff --json
        env:
          GROQ_API_KEY: ''
          ANTHROPIC_API_KEY: ''

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm audit --audit-level=high || true
