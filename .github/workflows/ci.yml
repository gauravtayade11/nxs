name: nxs CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

  smoke-test:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: nxs --version
        run: node cli/index.js --version

      - name: nxs info
        run: node cli/index.js info

      - name: nxs explain CrashLoopBackOff (mock mode)
        run: node cli/index.js explain CrashLoopBackOff --json
        env:
          GROQ_API_KEY: ''
          ANTHROPIC_API_KEY: ''

      - name: nxs devops analyze (mock mode)
        run: |
          echo "ERROR: npm install failed with exit code 1" | \
          node cli/index.js devops analyze --stdin --json --no-chat
        env:
          GROQ_API_KEY: ''
          ANTHROPIC_API_KEY: ''

      - name: nxs rbac scan --json (no cluster — should exit gracefully)
        run: node cli/index.js rbac scan --json 2>&1 | head -5 || true

      # Capture output to file so we can pipe it to nxs on failure
      - name: Run auth tests
        id: auth-tests
        continue-on-error: true
        run: |
          {
            echo "Workflow: ${{ github.workflow }}"
            echo "Branch:   ${{ github.ref_name }}"
            echo "Run URL:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "---"
            echo "PASS src/api/health.test.js (12ms)"
            echo "PASS src/api/users.test.js (18ms)"
            echo "FAIL src/services/auth.test.js"
            echo ""
            echo "  ● AuthService › login › should return 200 with valid credentials"
            echo ""
            echo "    expect(received).toBe(expected)"
            echo "    Expected: 200"
            echo "    Received: 401"
            echo ""
            echo "    Reason: TEST_JWT_SECRET environment variable is not set"
            echo "    The JWT verification failed because no secret was provided."
            echo ""
            echo "      at Object.<anonymous> (src/services/auth.test.js:34:5)"
            echo ""
            echo "Test Suites: 1 failed, 2 passed, 3 total"
            echo "Tests:       1 failed, 47 passed, 48 total"
            exit 1
          } 2>&1 | tee /tmp/test-output.log
        env:
          NODE_ENV: test

      # Only runs when auth-tests failed — uses the captured log directly
      - name: Analyze failure and notify Slack
        if: steps.auth-tests.outcome == 'failure'
        run: cat /tmp/test-output.log | node cli/index.js ci analyze --stdin --notify slack --no-chat || true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # Re-fail the job after notification
      - name: Fail if tests failed
        if: steps.auth-tests.outcome == 'failure'
        run: exit 1

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: npm audit
        run: npm audit --audit-level=high || true
