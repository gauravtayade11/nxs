name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'cli/**'
      - 'README.md'

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to create GitHub releases
      id-token: write       # needed for npm OIDC trusted publisher

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check version not already published
        id: version_check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT
          if npm view @nextsight/nxs-cli@$PKG_VERSION version 2>/dev/null; then
            echo "already_published=true" >> $GITHUB_OUTPUT
            echo "Version $PKG_VERSION already on npm — skipping"
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
            echo "Version $PKG_VERSION not yet published — will publish"
          fi

      - name: Publish to npm (OIDC trusted publisher)
        if: steps.version_check.outputs.already_published == 'false'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.version_check.outputs.already_published == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version_check.outputs.version }}
          name: v${{ steps.version_check.outputs.version }}
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            npm install -g @nextsight/nxs-cli
            ```

            Full changelog auto-generated below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "### Published @nextsight/nxs-cli@$VERSION to npm" >> $GITHUB_STEP_SUMMARY
          echo "Install: \`npm install -g @nextsight/nxs-cli\`" >> $GITHUB_STEP_SUMMARY
          echo "GitHub Release: v$VERSION created" >> $GITHUB_STEP_SUMMARY
