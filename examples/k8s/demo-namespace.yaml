apiVersion: v1
kind: Namespace
metadata:
  name: nxs-demo-bad
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crash-loop-demo
  namespace: nxs-demo-bad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crash-loop-demo
  template:
    metadata:
      labels:
        app: crash-loop-demo
    spec:
      containers:
        - name: app
          image: alpine:3.18
          command: ["sh", "-c", "echo 'missing config, exiting'; exit 1"]
          resources:
            limits:
              memory: "64Mi"
---
apiVersion: v1
kind: Pod
metadata:
  name: image-pull-demo
  namespace: nxs-demo-bad
spec:
  containers:
    - name: app
      image: mycompany/private-app:v99.99.99-does-not-exist
      command: ["sh", "-c", "sleep 3600"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-demo
  namespace: nxs-demo-bad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-demo
  template:
    metadata:
      labels:
        app: oom-demo
    spec:
      containers:
        - name: app
          image: python:3.11-alpine
          command:
            - sh
            - -c
            - |
              echo "Allocating memory until OOM..."
              python - << 'PY'
import time
buf = []
while True:
    buf.append('x' * 1024 * 1024)  # 1 MiB
    time.sleep(0.05)
PY
          resources:
            limits:
              memory: "50Mi"
---
apiVersion: v1
kind: Pod
metadata:
  name: pending-demo
  namespace: nxs-demo-bad
spec:
  # Intentionally unschedulable on most clusters (fake node selector)
  nodeSelector:
    kubernetes.io/hostname: non-existent-node
  containers:
    - name: app
      image: alpine:3.18
      command: ["sh", "-c", "sleep 3600"]

