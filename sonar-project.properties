sonar.projectKey=gauravtayade11_nxs
sonar.organization=gauravtayade11

sonar.projectName=nxs
sonar.projectVersion=2.1.3

sonar.sources=cli
sonar.tests=cli/tests
sonar.exclusions=**/node_modules/**,cli/tests/**
sonar.test.inclusions=cli/tests/**/*.test.js

sonar.javascript.lcov.reportPaths=coverage/lcov.info

