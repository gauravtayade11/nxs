apiVersion: v1
kind: Pod
metadata:
  name: healthy-demo
  namespace: nxs-demo-good
  labels:
    app: healthy-demo
    demo: nxs-good-case
spec:
  containers:
  - name: healthy-demo
    image: nginx:1.25-alpine
    ports:
    - containerPort: 80
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 10
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 10
      periodSeconds: 20
    resources:
      requests:
        memory: "32Mi"
        cpu: "50m"
      limits:
        memory: "64Mi"
        cpu: "100m"
  restartPolicy: Always
