---
# Patch Alertmanager to send all alerts to nxs-server
# After nxs-server is running, apply this:
#   kubectl apply -f k8s/alertmanager-config.yaml
#   kubectl delete pod -n monitoring -l app.kubernetes.io/name=alertmanager

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alertmanager
  namespace: monitoring
data:
  alertmanager.yml: |
    global: {}
    receivers:
      - name: default-receiver

      - name: nxs
        webhook_configs:
          - url: http://nxs-server.monitoring.svc.cluster.local:4000/webhook/alertmanager
            send_resolved: true

    route:
      group_by: [alertname, namespace]
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      receiver: nxs

      # Route critical alerts immediately
      routes:
        - match:
            severity: critical
          receiver: nxs
          group_wait: 5s

    templates:
      - /etc/alertmanager/*.tmpl
